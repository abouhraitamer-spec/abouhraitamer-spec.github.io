function bc$(id) {
	return document.getElementById(id);
};

function show(what, which) {
	// Hide whatever we are not choosing, display what we are choosing.
	bc$("door" + which).style.display = (what == "door") ? "" : "none";
	bc$("doorstay" + which).style.display = (what == "doorstay") ? "" : "none";
	bc$("doorswitch" + which).style.display = (what == "doorswitch") ? "" : "none";
	bc$("goat" + which).style.display = (what == "goat") ? "" : "none";
	bc$("goatlose" + which).style.display = (what == "goatlose") ? "" : "none";
	bc$("carwin" + which).style.display = (what == "carwin") ? "" : "none";
	bc$("carlose" + which).style.display = (what == "carlose") ? "" : "none";
};

function handleUserDoorChoice(doorNum) {
	// save the door they have chosen
	g.doorChoice = doorNum;
	// Mark it visually
	show("doorstay", doorNum);

	// Show a goat - hack, pick randomly until we choose a door that is not user's selection and not the car
	var showDoor = chooseDoor();
	while (showDoor == g.doorChoice || showDoor == g.carDoor) showDoor = chooseDoor();
	show("goat", showDoor);
	var text = "You chose door number " + g.doorChoice + ". There is a goat behind door number" + showDoor + "do you want to switch or stay?";
	bc$("doors").setAttribute("aria-label", text);
	if (g.simCount < 0) bc$("doors").setAttribute("aria-live", "polite");
	// Mark remaining door as possibility for switching
	for (var i=1; i<= 3; i++) {
		if (i != showDoor && i != g.doorChoice) {
			g.doorSwitch = i;
			show("doorswitch", g.doorSwitch);
			break;
		}
	}
};

function handleReveal(doorNum) {
	var text = "You";
	// Update right set of variables, based on whether user stuck with original choice or switched.
	var staySwitch = (doorNum == g.doorChoice) ? g.stay : g.switch;
	staySwitch.count++;
	if (doorNum == g.carDoor) {
		// won
		text = "You won";
		staySwitch.winCount++;
		// Show car in chosen door
		show("carwin", doorNum);
		// Show goat in both non-chosen doors.
		for (var i=1; i<= 3; i++) {
			if (i != g.carDoor) show("goat", i);
		}
	} else {
		text = "You did not find the car";
		// lost, show goat in chosen door, and car in its door.
		show("goatlose", doorNum);
		show("carlose", g.carDoor);
	}
	bc$("doors").setAttribute("aria-label", text);
//	bc$("1").setAttribute("aria-live", "polite");
	if (g.simCount < 0) 
		bc$("playagainbutton").focus();
	
	// Track relative frequency so far
	staySwitch.freq[staySwitch.count] = staySwitch.winCount / staySwitch.count;
	updateStats();
}

function doorClick(doorNum) {
	switch(g.gameStage) {
		case 1: 
			handleUserDoorChoice(doorNum);
			// Move to next stage in game
			g.gameStage++;
			break;
		case 2:
			if (doorNum != g.doorChoice && doorNum != g.doorSwitch) {
				// User clicked on goat... could do something funny here later, but for now do nothing;
				return;
			}
			handleReveal(doorNum);
			// Move to next stage in game
			g.gameStage++;
			break;
		default:
			// If user clicks after game is done, play again
			playAgain();
	}
};

function updateStats() {
	bc$("stayWins").innerHTML = g.stay.winCount + getPctText(g.stay.winCount / g.stay.count);
	bc$("stayLosses").innerHTML = g.stay.count - g.stay.winCount + getPctText((g.stay.count - g.stay.winCount) / g.stay.count);
	bc$("stayTotal").innerHTML = g.stay.count;
	bc$("switchWins").innerHTML = g.switch.winCount + getPctText(g.switch.winCount / g.switch.count);
	bc$("switchLosses").innerHTML = g.switch.count - g.switch.winCount + getPctText((g.switch.count - g.switch.winCount) / g.switch.count);
	bc$("switchTotal").innerHTML = g.switch.count;
	// Reset the frequency plot, redraw with new labels.
	resetFreqPlot(g_freqPlot);
	drawFreqPlot(g_freqPlot);
};

function getPctText(ratio) {
	if (isNaN(ratio)) return "";
	var pct = Math.round(ratio * 100);
	var pctText = " (" + pct + "%)";
	return pctText;
};

function playAgain() {
	// Reset the focus
//	bc$("1").setAttribute("aria-live", "off");
	bc$("doors").setAttribute("aria-label", "pick a door");
	if (g.simCount < 0) 
		bc$("doors").focus();
	// Reset to show doors
	show("door",1);
	show("door",2);
	show("door",3);
	// Choose door for car
	g.carDoor = chooseDoor();
	// Show no user choice yet
	g.doorChoice = 0;
	g.doorSwitch = 0;
	// No goat shown yet
	g.goatShownDoor = 0;
	// Reset stage
	g.gameStage = 1;
};

function chooseDoor() {
	var door = Math.floor((Math.random() * 3) + 1);
	if (door < 1) door = 1;
	if (door > 3) door = 3;
	return door;
};

function reset() {
	resetGlobals();
	updateStats();
	playAgain();
};

function sim() {
	// If simCount is not a number, replace with 10.
	if (isNaN(bc$("simCount").value)) {
		bc$("simCount").value = "10";
	}
	g.simCount = parseInt(bc$("simCount").value);
	
	g.animationCount++;
	// Start simulation trials.
	var animationCount = g.animationCount;
	setTimeout(function(){simTrialStart(animationCount)}, 0);
};

function stopSim() {
	// Setting simCount to -1 will stop the simulation.
	g.simCount = -1;
}

function simDelay() {
	if (bc$("animate").checked) {
		return g.animateDelay;
	} else {
		return 0;
	}
}

function simTrialStart(animationCount) {
	// Check for done, or user pressed Reset, or new simulation
	if (g.simCount < 1 || animationCount != g.animationCount) return;
	// Initialize and display doors.
	playAgain();
	// Delay before choosing door.
	setTimeout(function(){simTrialChooseDoor(animationCount)}, simDelay());	
};

function simTrialChooseDoor(animationCount) {
	// Check for done, or user pressed Reset, or new simulation
	if (g.simCount < 1 || animationCount != g.animationCount) return;
	// Choose a door and handle that choice
	handleUserDoorChoice(chooseDoor());
	// Delay before displaying results.
	setTimeout(function(){simTrialReveal(animationCount)}, simDelay());	
};

function simTrialReveal(animationCount) {
	// Check for done, or user pressed Reset, or new simulation
	if (g.simCount < 1 || animationCount != g.animationCount) return;
	// Based on strategy, decide what user would have done
	var doorNum = (bc$("simStrategy").value == "stay") ? g.doorChoice : g.doorSwitch;
	// Handle the reveal
	handleReveal(doorNum);
	// Delay and then start again
	g.simCount--;
	setTimeout(function(){simTrialStart(animationCount)}, simDelay());
};

// Get url parameter value
function gup(name) {
  name = name.replace(/[\[]/,"\\\[").replace(/[\]]/,"\\\]");
  var regexS = "[\\?&]"+name+"=([^&#]*)";
  var regex = new RegExp( regexS );
  var results = regex.exec( window.location.href );
  if( results == null )
    return "";
  else
    return results[1];
};

function plotSetup(plot) {
	// Get canvas and context pointers once so we can reuse them everywhere.
	plot.canvas = bc$(plot.canvasName);
	plot.ctx = plot.canvas.getContext("2d");  
	// Set chart width and height, based on html canvas definition.
	plot.canvasWidth = plot.canvas.width;
	plot.canvasHeight = plot.canvas.height;
	// Set usable canvas width and height, leaving space for x border and y border and y2 border.
	plot.usableCanvasWidth = plot.canvasWidth - plot.yBorderWidth - plot.y2BorderWidth;
	plot.usableCanvasHeight = plot.canvasHeight - plot.topBorderWidth - plot.xBorderWidth;
};


function stdPlotYLabelFct(plot, y, yLabelDecimals) {
	var yLabelText = y.toFixed(yLabelDecimals).replace(".000000000".substring(0,yLabelDecimals+1),"");
	// Scale by plot.chartToCanvasScaleY to convert (y - plot.minY) to canvas Y.
	// We have to subtract off plot.minY because our translated/rotated canvas has (0,0) as the left edge of the bottom y-axis label.
	// So if y is plot.minY, then we want canvasY to be zero.
	var canvasY = (y - plot.minY) * plot.chartToCanvasScaleY; 
	return {
		yLabelText: yLabelText,
		canvasY: canvasY
	}
};

// Clear the freq plot and redraw axes
function resetFreqPlot(plot) {
	// clear the entire canvas.
	plot.ctx.clearRect(0, 0, plot.canvas.width, plot.canvas.height);
	// Create axes etc.
	freqPlotSetup(plot);
};

function freqPlotSetup(plot) {
	setFreqPlotMinMax(plot);
	setPlotScale(plot);
	drawAxes(plot, plot.ctx);
};

function setFreqPlotMinMax(plot) {
	plot.minX = 0;
	plot.minY = -0.1;
	plot.maxY = 1.1; 
	var maxCount = (g.switch.count > g.stay.count) ? g.switch.count : g.stay.count;
	// For this graph, we want maxX to be smallest n so that 10 * 2^n is larger than maxCount
	// So we want smallest n so that ln(g_trial.length/10) <= n * ln(2)
	// So we want smallest n so that ln(g_trial.length/10) / ln(2) <= n
	if (maxCount > 0) {
		plot.maxX = 10 * Math.pow(2, Math.ceil(Math.log(maxCount / 10) / Math.log(2)));
	}
	if (plot.maxX < 20) plot.maxX = 20;
};

function setPlotScale(plot) {
	// Set scaling factors, to go from chart to canvas.
	if (plot.maxX > plot.minX) {
		plot.chartToCanvasScaleX = plot.usableCanvasWidth / (plot.maxX - plot.minX);
	} else {
		plot.chartToCanvasScaleX = 1;
	}
	if (plot.maxY > plot.minY) {
		plot.chartToCanvasScaleY = plot.usableCanvasHeight / (plot.maxY - plot.minY);
	} else {
		plot.chartToCanvasScaleY = 1;
	}
};

function drawAxes(plot, ctx) {
	// Draw x-axis and y-axis
	// Note that it is important to use beginPath() and closePath(), otherwise later changes to strokeStyle
	// (e.g. color changes) will apply to axis lines!
	ctx.strokeStyle = "black"; 
	ctx.beginPath();
	ctx.moveTo(toCanvasX(plot, plot.minX),toCanvasY(plot, plot.minY));
	ctx.lineTo(toCanvasX(plot, plot.maxX),toCanvasY(plot, plot.minY));
	// stroke does the work of drawing the line, without this the user will not be able to see it.
	ctx.stroke();
	ctx.moveTo(toCanvasX(plot, plot.minX),toCanvasY(plot, plot.minY));
	ctx.lineTo(toCanvasX(plot, plot.minX),toCanvasY(plot, plot.maxY));
	ctx.stroke();
	ctx.closePath();
};

// Convert chart X values to canvas X values (add on y-axis border width).
// Start by subtracting off minX, to make relative. Then multiply by chartToCanvasScaleX.
// Finally, add on border width to leave space for y-axis border.
function toCanvasX(plot, chartX) {
	return ((chartX-plot.minX) * plot.chartToCanvasScaleX + plot.yBorderWidth);
};

// Convert chart Y values (0 is at bottom) to canvas Y values (0 is at top).
// Leave space at bottom for x-axis border.
// Start by subtracting off minY, to make relative. Then multiply by chartToCanvasScaleY.
// Subtract from canvas height, and leave space for x-axis border.
function toCanvasY(plot, chartY) {
	return (plot.canvasHeight - (chartY-plot.minY) * plot.chartToCanvasScaleY - plot.xBorderWidth);
};

function plotFreq(plot, staySwitch, color) {
var canvas = plot.canvas;
var ctx = plot.ctx;
var dotHalfWidthPixels = 1;

	ctx.fillStyle = color;
	for (var rep=1; rep <= staySwitch.count; rep++) {
		var yValue = staySwitch.freq[rep];
		// rect(x,y,width,height)
		ctx.fillRect(toCanvasX(plot, rep),
			toCanvasY(plot, yValue),
			dotHalfWidthPixels * 2,
			dotHalfWidthPixels * 2);
	}
}

function drawFreqPlot(plot) {
	// plot stay results
	plotFreq(plot, g.stay, "blue");
	// plot switch results
	plotFreq(plot, g.switch, "green");
};
