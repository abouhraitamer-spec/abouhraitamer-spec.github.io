
<!-- Aquest codi és un HTML i es diu index.html perquè tots els navegadors busquen index.html per obrir-lo-->
<!DOCTYPE html>

<html lang="ca">
<!-- La llengua emprada es català, si fos castellà seria "es" i angles "en"-->
<head>
<!-- head significa capçalera. Tots els codis de html tenen dos parts: head, body. En el head posem 
  contingut que no veu l'usuari o es secundari per l'usuari-->
  <meta charset="UTF-8">
<!-- Tot html ha de dir quin conjunt de caractrs o lletres que utilitzem. Això es una metainformació i per això posa meta,
  UTF-8, es el conjunt de caràcters que utilitzem que es unicode text format de 8 bits, UTF-8 inclou la ç, accents oberts i tancats.
  Charset vol dir character set, es el set que vol dir conjunt de "characters" o caracters o lletres.-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- El viewport és una metainformació de com veien la pàgina web i la veiem amb lo que diu dins de content o contingut.
  Width=device-width significa que l'amplada del nostre contingut serà igual a l'amplada del dispositiu (device), accepta qualsevol dispositiu:
  rellotge, móbil, tauleta, PC, televisió, pantalla de cinema, etc...Initial scale és la escala inicial és 1.0, si fos 2.0 sortiria el doble de gran-->
  <title>Càlcul de la posició d'un robot</title>
<!-- Title és el titol de la pestanya i no és el titol del document.-->
  <script type="text/javascript" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js">
<!-- Script és una etiqueta molt important perquè ens indica que el que hi ha després és javascript. La línia anterior carrega Mathjax, que ens permet que surtin formes matemàtiques boniques-->
  </script>

  <style>

    body {

      font-family: Arial, sans-serif;

      margin: 20px;

    }


    .equation {

      margin: 20px 0;

    }


    .results {

      font-weight: bold;

    }


    /* Oculta els elements de sortida per defecte */

    #output, #robotCanvas {

      display: none;

    }


    canvas {

      border: 1px solid black;

    }

  </style>

</head>

<body>

  <h1>Càlcul de la posició d'un robot amb dos braços</h1>

  <div>

    <label for="a1">Longitud del primer braç (a₁):</label>
<!-- label és una etiqueta per indicar que s'ha de posar un input-->
    <input type="number" id="a1" value="1" step="0.1"><br><br>


    <label for="a2">Longitud del segon braç (a₂):</label>

    <input type="number" id="a2" value="0.5" step="0.1"><br><br>


    <label for="x">Posició final (x, en metres):</label>

    <input type="number" id="x" value="1.2" step="0.1"><br><br>


    <label for="y">Posició final (y, en metres):</label>

    <input type="number" id="y" value="1.8" step="0.1"><br><br>


    <button onclick="calculateAngles()">Calcula la posició</button>

  </div>

  <div id="output"></div>

  <canvas id="robotCanvas" width="400" height="400"></canvas>


<script>

function calculateAngles() {

  // Agafar les dades introduïdes per l'usuari

  let a1 = parseFloat(document.getElementById('a1').value);

  let a2 = parseFloat(document.getElementById('a2').value);
  // let q1_deg = parseFloat(document.getElementById('q1').value); //Graus
  // let q2_deg = parseFloat(document.getElementById('q2').value); //Graus

  let x = parseFloat(document.getElementById('x').value); // Metres

  let y = parseFloat(document.getElementById('y').value); // Metres

let d = Math.sqrt(x*x+y*y);
  //Calcula amb pitàgores la distància de la hipotenusa del braç robótic en posició x,y (la hipotenusa es la distància entre la base i la punta manipuladora del robot)

  let q2 = Math.acos((d*d-a1*a1-a2*a2)/(2*a1*a2));
  //Es el càlcul de l'angle 2
  
let k1 = a1+a2+Math.cos(q2);
  let k2 = a2*Math.sin(q2);

  let q1 = Math.atan2(y,x)-Math.atan2(k1,k2);
  //Es el càlcul de l'angle 1
  //q1 i q2 en el sistema internacional (S.I.) son radians, perquè he utilitzat x i y en metres i
  //no em pot donar graus, perquè graus no es del sistema internacional. Malgrat tot, jo ho vull en graus
  let q1_deg = q1*180/Math.PI;
  let q2_deg = q2*180/Math.PI;
  //q1_deg i q2_deg son els resultats de q1 y q2 en graus (degrees)
  
  // **Mostrar els contenidors de sortida**

  document.getElementById('output').style.display = 'block';

  document.getElementById('robotCanvas').style.display = 'block';
  //Aquest contenidors només sortiràn si l'usuari clica a un botó que està a la línia 84 que activa a la 95 i aquesta activa la 112 i 113.


  // Fase 1: Fórmules

   let output = "<div class='equation'>Les equacions per calcular els angles són:</div>";
            output += "<div class='equation'>\\[ q_2 = \\arccos\\left(\\frac{d^2 - a_1^2 - a_2^2}{2 a_1 a_2}\\right) \\]</div>";
            output += "<div class='equation'>\\[ q_1 = \\arctan\\left(y, x\\right) - \\arctan\\left(\\frac{a_2 \\sin(q_2)}{a_1 + a_2 \\cos(q_2)}\\right) \\]</div>";

            // Substituir les variables
            output += `<div class='equation'>Substituint els valors:</div>`;
            output += `<div class='equation'>\\[ d = \\sqrt{${x}^2 + ${y}^2} = ${d.toFixed(2)} \\]</div>`;
            output += `<div class='equation'>\\[ q_2 = \\arccos\\left(\\frac{${d.toFixed(2)}^2 - ${a1}^2 - ${a2}^2}{2 \\times ${a1} \\times ${a2}}\\right) = ${q2_deg.toFixed(2)}° \\]</div>`;
            output += `<div class='equation'>\\[ q_1 = \\arctan\\left(${y}, ${x}\\right) - \\arctan\\left(\\frac{${a2} \\sin(${q2_deg.toFixed(2)}°)}{${a1} + ${a2} \\cos(${q2_deg.toFixed(2)}°)}\\right) = ${q1_deg.toFixed(2)}° \\]</div>`;

            document.getElementById('output').innerHTML = output;
            MathJax.typeset();  // Renderitzar MathJax per mostrar les fórmules correctament

            // Visualització gràfica
            let canvas = document.getElementById('robotCanvas');
            let ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Netejar canvas

            // Centre i escales
            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;
            let scale = 80;

            // Coordenades
            let x1 = a1 * Math.cos(q1);
            let y1 = a1 * Math.sin(q1);
            let x2 = x1 + a2 * Math.cos(q1 + q2);
            let y2 = y1 + a2 * Math.sin(q1 + q2);

            // Dibuixar braç 1
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + x1 * scale, centerY - y1 * scale);
            ctx.strokeStyle = 'blue';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Dibuixar braç 2
            ctx.beginPath();
            ctx.moveTo(centerX + x1 * scale, centerY - y1 * scale);
            ctx.lineTo(centerX + x2 * scale, centerY - y2 * scale);
            ctx.strokeStyle = 'green';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Dibuixar els cercles als extrems
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI); // Base del braç
            ctx.fillStyle = 'red';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX + x1 * scale, centerY - y1 * scale, 5, 0, 2 * Math.PI); // Final del primer braç
            ctx.fillStyle = 'red';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX + x2 * scale, centerY - y2 * scale, 5, 0, 2 * Math.PI); // Final del segon braç
            ctx.fillStyle = 'red';
            ctx.fill();
        }
    </script>

</body>
</html>
